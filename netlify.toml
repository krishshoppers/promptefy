[build]
  publish = "public"
  command = "echo 'Static build'"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Proxy API requests to Railway — eliminates CORS entirely
[[redirects]]
  from = "/api/*"
  to = "https://promptefy-production.up.railway.app/api/:splat"
  status = 200
  force = true

# SPA fallback — must be LAST
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
